<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EditorFrame · Blender Dock · Full Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bundled framework + UI library — generated by tools/build.mjs from src/. -->
  <link rel="stylesheet" href="./dist/ef.css">

  <!-- Demo-only styling. -->
  <link rel="stylesheet" href="./demo/widgets/demo.css">
  <style>
    html, body { margin: 0; height: 100%; background: var(--ef-bg-0, #07070a); overflow: hidden; }
    #app { width: 100vw; height: 100vh; }

    /* fake-widget styling — these live in the demo, not the framework */
    .demo-pad { padding: 14px 16px; font: 12px/1.5 var(--ef-font-ui, system-ui); color: var(--ef-fg-1, #c4c4cc); }
    .demo-pad input, .demo-pad textarea {
      width: 100%; box-sizing: border-box;
      background: var(--ef-bg-2, #1a1a20); border: 1px solid var(--ef-border, #2a2a30); border-radius: 3px;
      color: var(--ef-fg-0, #e8e8f0); padding: 6px 8px; font: inherit; outline: none;
    }
    .demo-pad textarea { min-height: 100px; resize: vertical; font-family: var(--ef-font-mono, monospace); }
    .demo-pad button {
      margin-top: 6px; padding: 4px 10px;
      background: var(--ef-bg-3, #2a2a30); border: 1px solid var(--ef-border-strong, #38383f); border-radius: 3px;
      color: var(--ef-fg-1, #c4c4cc); font: inherit; cursor: pointer;
    }
    .demo-pad button:hover { background: var(--ef-bg-4, #38383f); color: var(--ef-fg-0, #fff); }
    .demo-tag {
      color: var(--ef-fg-3, #72727c);
      font-family: monospace;
      margin-bottom: 8px;
      word-break: break-all;
      overflow-wrap: anywhere;
    }
    .demo-pad { min-width: 0; word-break: break-word; }
    .demo-canvas { background: var(--ef-bg-0, #0a0a0e); border: 1px solid var(--ef-border, #1c1c1f); border-radius: 3px;
                   width: 100%; height: 160px; display: block; }
    .demo-toolbar-btn {
      display: inline-flex; align-items: center; justify-content: center;
      height: 28px; min-width: 28px; padding: 0 10px;
      background: transparent; border: 0; border-right: 1px solid var(--ef-border);
      color: var(--ef-fg-2, #9494a0); cursor: pointer; font: 12px var(--ef-font-ui, system-ui);
    }
    .demo-toolbar-btn:hover { background: var(--ef-hover, #1a1a1f); color: var(--ef-fg-0, #fff); }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- One bundle, no dependency ordering to manage. § 2.2 zero-build is preserved
       because dist/ef.js is just `cat` of src/ — see tools/build.mjs. -->
  <script src="./dist/ef.js"></script>

  <!-- Demo widget definitions (live in user code, not the framework). -->
  <script src="./demo/widgets/ui-showcase.js"></script>
  <script src="./demo/widgets/theme-config.js"></script>

  <script>
    'use strict'

    // ═══════════════════════════════════════════════════════
    // Demo widgets (live in user code, not the framework)
    // ═══════════════════════════════════════════════════════

    // 1. monaco-fake — a stand-in for a heavy editor. Records text + a
    //    counter; demonstrates that detached-DOM activation preserves all
    //    DOM + JS state across split / merge / activate / cross-dock move.
    EF.registerWidget('monaco-fake', {
      defaults: function () { return { title: 'untitled.ts', props: { filePath: 'untitled.ts' } } },
      create: function (props, ctx) {
        const wrap = document.createElement('div')
        wrap.className = 'demo-pad'
        wrap.innerHTML =
          '<div class="demo-tag">monaco-fake · panel ' + ctx.panel.id + ' · ' + (props.filePath || '') + '</div>' +
          '<textarea placeholder="Type code here..."></textarea>' +
          '<div style="margin-top:8px"><button data-act="dirty">mark dirty</button> ' +
          '<button data-act="clean">mark clean</button> ' +
          '<button data-act="popout">pop out window</button></div>'
        const ta = wrap.querySelector('textarea')
        ta.addEventListener('input', function () { ctx.panel.setDirty(true) })
        wrap.querySelector('[data-act=dirty]').onclick  = function () { ctx.panel.setDirty(true) }
        wrap.querySelector('[data-act=clean]').onclick  = function () { ctx.panel.setDirty(false) }
        wrap.querySelector('[data-act=popout]').onclick = function () { ctx.panel.popOut() }
        return wrap
      },
      serialize:   function (el) { return { text: el.querySelector('textarea').value } },
      deserialize: function (el, state) {
        if (state && state.text != null) el.querySelector('textarea').value = state.text
      },
    })

    // 2. preview-fake — canvas + click counter. Demonstrates that <canvas>
    //    pixel state survives detached DOM activation (reattach restores).
    EF.registerWidget('preview-fake', {
      defaults: function () { return { title: 'Preview' } },
      create: function (props, ctx) {
        const wrap = document.createElement('div')
        wrap.className = 'demo-pad'
        wrap.innerHTML =
          '<div class="demo-tag">preview-fake · panel ' + ctx.panel.id + '</div>' +
          '<canvas class="demo-canvas" width="400" height="160"></canvas>' +
          '<div style="margin-top:6px"><button>paint random circle</button> ' +
          '<span data-c>0 strokes</span></div>'
        const cv = wrap.querySelector('canvas')
        const cx = cv.getContext('2d')
        const cnt = wrap.querySelector('[data-c]')
        cx.fillStyle = '#0a0a0e'; cx.fillRect(0,0,cv.width,cv.height)
        let n = 0
        wrap.querySelector('button').onclick = function () {
          n++
          cx.fillStyle = 'hsl(' + (n*40 % 360) + ',60%,55%)'
          cx.beginPath()
          cx.arc(Math.random()*cv.width, Math.random()*cv.height, 8 + Math.random()*22, 0, Math.PI*2)
          cx.fill()
          cnt.textContent = n + ' strokes'
        }
        return wrap
      },
    })

    // 3. terminal-fake — input + output buffer + bus integration.
    EF.registerWidget('terminal-fake', {
      defaults: function () { return { title: 'Terminal' } },
      create: function (props, ctx) {
        const wrap = document.createElement('div')
        wrap.className = 'demo-pad'
        wrap.innerHTML =
          '<div class="demo-tag">terminal-fake · panel ' + ctx.panel.id + '</div>' +
          '<div data-out style="background:var(--ef-bg-0);border:1px solid var(--ef-border);border-radius:3px;' +
          'padding:6px 8px;min-height:80px;font:11px monospace;color:var(--ef-success);' +
          'white-space:pre-wrap;margin-bottom:6px"></div>' +
          '<input placeholder="type a command, then Enter">'
        const out = wrap.querySelector('[data-out]')
        const inp = wrap.querySelector('input')
        inp.addEventListener('keydown', function (e) {
          if (e.key !== 'Enter') return
          const line = inp.value
          inp.value = ''
          out.textContent += '> ' + line + '\n'
          ctx.bus.emit('terminal:line', { panelId: ctx.panel.id, text: line })
        })
        return wrap
      },
    })

    // 4. listener-fake — subscribes to terminal:line via ctx.bus.
    EF.registerWidget('listener-fake', {
      defaults: function () { return { title: 'Bus Listener' } },
      create: function (props, ctx) {
        const wrap = document.createElement('div')
        wrap.className = 'demo-pad'
        wrap.innerHTML =
          '<div class="demo-tag">listener-fake · panel ' + ctx.panel.id + ' · listening to terminal:line</div>' +
          '<div data-out style="background:var(--ef-bg-0);border:1px solid var(--ef-border);border-radius:3px;' +
          'padding:6px 8px;min-height:80px;font:11px monospace;color:var(--ef-accent-soft);white-space:pre-wrap"></div>'
        const out = wrap.querySelector('[data-out]')
        ctx.bus.on('terminal:line', function (payload) {
          out.textContent += '[' + payload.panelId + '] ' + payload.text + '\n'
        })
        return wrap
      },
    })

    // 5. buggy — synchronous + async errors, isolated to this panel.
    EF.registerWidget('buggy', {
      defaults: function () { return { title: 'Buggy' } },
      create: function (props, ctx) {
        const wrap = document.createElement('div')
        wrap.className = 'demo-pad'
        wrap.innerHTML =
          '<div class="demo-tag">buggy · panel ' + ctx.panel.id + '</div>' +
          '<div>Use the buttons to throw errors. Open the error-log panel to see them isolated.</div>' +
          '<div style="margin-top:8px">' +
          '<button data-act="sync">throw sync</button> ' +
          '<button data-act="async">throw async</button> ' +
          '<button data-act="reject">reject promise</button>' +
          '</div>'
        wrap.querySelector('[data-act=sync]').onclick = function () {
          ctx.safeCall(function () { throw new Error('sync error from buggy panel ' + ctx.panel.id) })
        }
        wrap.querySelector('[data-act=async]').onclick = function () {
          setTimeout(function () { throw new Error('async error from buggy panel ' + ctx.panel.id) }, 10)
        }
        wrap.querySelector('[data-act=reject]').onclick = function () {
          Promise.reject(new Error('rejected promise from buggy panel ' + ctx.panel.id))
        }
        return wrap
      },
    })

    // 6. dock-actions — a static toolbar widget demonstrating that toolbar
    //    items are just regular widgets (no special API). Provides Focus +
    //    Collapse buttons that act on the dock they live in.
    EF.registerWidget('dock-actions', {
      create: function (props, ctx) {
        const wrap = document.createElement('div')
        wrap.style.cssText = 'display:contents'
        const focus = document.createElement('button')
        focus.className = 'demo-toolbar-btn'
        focus.textContent = '⛶'
        focus.title = 'Toggle focus mode'
        focus.onclick = function () { ctx.dock.toggleFocus() }

        const collapse = document.createElement('button')
        collapse.className = 'demo-toolbar-btn'
        collapse.textContent = '⌃'
        collapse.title = 'Toggle collapsed'
        collapse.onclick = function () { ctx.dock.setCollapsed(!ctx.dock.collapsed()) }

        wrap.appendChild(focus)
        wrap.appendChild(collapse)
        return wrap
      },
    })

    // ═══════════════════════════════════════════════════════
    // Build the layout
    // ═══════════════════════════════════════════════════════
    const { createDockLayout, dock, split, panel } = EF

    const isPopup = new URLSearchParams(window.location.search).has('ef-popup')

    let tree
    if (isPopup) {
      tree = dock({
        name: 'popup-root',
        toolbar: {
          direction: 'top',
          items: [
            { widget: 'tab-standard', align: 'start' },
            { widget: 'dock-actions',  align: 'end' },
          ],
        },
      })
    } else {
      tree = split('vertical', [
        split('horizontal', [
          // Sidebar dock
          dock({
            name: 'sidebar',
            toolbar: {
              direction: 'left',
              items: [
                { widget: 'tab-sidebar', align: 'start' },
                { widget: 'dock-actions', align: 'end' },
              ],
            },
            panels: [
              panel({ widget: 'preview-fake', title: 'Outline', icon: '☰' }),
              panel({ widget: 'preview-fake', title: 'Browser', icon: '◫' }),
              panel({ widget: 'preview-fake', title: 'Search',  icon: '⌕' }),
            ],
          }),

          // Editor dock — now hosts the UI Showcase as the lead panel.
          dock({
            name: 'editor',
            toolbar: {
              direction: 'top',
              items: [
                { widget: 'tab-standard', align: 'start' },
                { widget: 'dock-actions',  align: 'end' },
              ],
            },
            panels: [
              panel({ widget: 'ui-showcase' }),
              panel({ widget: 'monaco-fake', title: 'main.ts',  props: { filePath: 'main.ts' } }),
              panel({ widget: 'monaco-fake', title: 'utils.ts', props: { filePath: 'utils.ts' }, transient: true }),
              panel({ widget: 'monaco-fake', title: 'README',   props: { filePath: 'README.md' } }),
            ],
          }),

          // Properties dock — Theme config + Inspector preview.
          dock({
            name: 'properties',
            toolbar: {
              direction: 'top',
              items: [{ widget: 'tab-compact', align: 'start' }],
            },
            panels: [
              panel({ widget: 'theme-config' }),
              panel({ widget: 'preview-fake', title: 'Inspector' }),
            ],
          }),
        ], [0.18, 0.55, 0.27]),

        // Bottom dock
        dock({
          name: 'bottom',
          toolbar: {
            direction: 'bottom',
            items: [
              { widget: 'tab-standard', align: 'start' },
              { widget: 'dock-actions', align: 'end' },
            ],
          },
          panels: [
            panel({ widget: 'terminal-fake' }),
            panel({ widget: 'listener-fake' }),
            panel({ widget: 'buggy' }),
            panel({ widget: 'error-log' }),
          ],
        }),
      ], [0.72, 0.28])
    }

    const layout = createDockLayout(document.getElementById('app'), {
      tree: tree,
      lru:  { max: -1 },
      hooks: {
        onDirtyDiscard: function (panels) {
          console.warn('[ef] merge would discard ' + panels.length + ' dirty panel(s):',
            panels.map(function (p) { return p.title }))
          return 'cancel'
        },
      },
    })

    // ── Console harness ──────────────────────────────────
    window.ef = {
      layout: layout,
      tree:   function () { return layout.tree() },
      list: function () {
        function walk(n, depth) {
          const pad = '  '.repeat(depth)
          if (n.type === 'dock') {
            console.log(pad + '[' + (n.name || n.id) + '] active=' + n.activeId +
              (n.focused ? ' [focused]' : '') + (n.collapsed ? ' [collapsed]' : ''))
            for (let i = 0; i < n.panels.length; i++) {
              const p = n.panels[i]
              console.log(pad + '  - ' + p.id + ' ' + (p.title || p.widget) +
                (p.id === n.activeId ? ' *' : '') + (p.dirty ? ' (dirty)' : '') +
                (p.transient ? ' (transient)' : ''))
            }
            return
          }
          console.log(pad + 'split ' + n.direction + ' [' + n.sizes.map(function (s) { return s.toFixed(2) }).join(',') + ']')
          for (let i = 0; i < n.children.length; i++) walk(n.children[i], depth + 1)
        }
        walk(layout.tree(), 0)
      },
      activate: function (id) { layout.activatePanel(id) },
      add: function (dockId, widget) {
        return layout.addPanel(dockId, { widget: widget || 'monaco-fake' })
      },
      remove: function (id) { layout.removePanel(id) },
      move:   function (panelId, dstDockId) { layout.movePanel(panelId, dstDockId) },
      promote: function (panelId) { layout.setTree(EF.promotePanel(layout.tree(), panelId)) },
    }

    if (!isPopup) {
      console.log('%c[ef]%c full demo loaded — ui-showcase + theme-config now in the layout',
        'color:#7b6ef6;font-weight:bold', 'color:inherit')
      console.log('  • Switch the editor tabs → UI Showcase shows every widget category')
      console.log('  • Switch the properties tabs → Theme config edits tokens live')
      console.log('  • Drag a tab to another dock → cross-dock move (state preserved)')
      console.log('  • Drag a tab outside the window → pop out into a new browser window')
      console.log('  • Click an icon tab in the sidebar twice → collapse the sidebar')
      console.log('  • Open buggy panel and throw errors → error-log catches them')
    } else {
      console.log('%c[ef]%c popup window — waiting for migration from opener',
        'color:#7b6ef6;font-weight:bold', 'color:inherit')
    }
  </script>
</body>
</html>
