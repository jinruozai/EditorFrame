<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EditorFrame · Phase 1 Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body { margin: 0; background: #0c0c0e; color: #c4c4cc;
                 font: 13px/1.5 -apple-system, system-ui, sans-serif; }
    .wrap { max-width: 820px; margin: 32px auto; padding: 0 24px; }
    h1 { color: #e8e8f0; font-weight: 500; margin: 0 0 4px; }
    .sub { color: #72727c; margin-bottom: 24px; }
    .group { margin-bottom: 18px; border-left: 2px solid #2a2a2f; padding-left: 14px; }
    .group h2 { font-size: 13px; color: #9494a0; margin: 0 0 8px;
                font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
    .row { display: flex; gap: 10px; align-items: flex-start; padding: 3px 0; }
    .tag { flex: 0 0 56px; font-family: 'SF Mono', Consolas, monospace;
           font-size: 11px; padding: 1px 6px; border-radius: 3px;
           text-align: center; line-height: 18px; }
    .pass { background: #1a3a1f; color: #7be58e; }
    .fail { background: #3a1a1f; color: #ff6e6e; }
    .msg  { flex: 1; }
    .msg .name { color: #c4c4cc; }
    .msg .detail { color: #72727c; font-family: 'SF Mono', Consolas, monospace;
                   font-size: 11px; margin-top: 2px; word-break: break-all; }
    .summary { margin-top: 24px; padding: 12px 16px; border-radius: 5px;
               font-size: 14px; }
    .summary.ok   { background: #14241a; color: #7be58e; border: 1px solid #2d5a3a; }
    .summary.bad  { background: #241414; color: #ff8888; border: 1px solid #5a2d2d; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Phase 1 Verification</h1>
    <div class="sub">core/signal · core/errors · core/bus · widgets/registry</div>
    <div id="out"></div>
    <div id="summary" class="summary"></div>
  </div>

  <!-- Load order = production load order -->
  <script src="../src/core/signal.js"></script>
  <script src="../src/core/errors.js"></script>
  <script src="../src/core/bus.js"></script>
  <script src="../src/widgets/registry.js"></script>

  <script>
    'use strict'

    const out = document.getElementById('out')
    let currentGroup = null
    let pass = 0, fail = 0

    function group(name) {
      currentGroup = document.createElement('div')
      currentGroup.className = 'group'
      currentGroup.innerHTML = '<h2>' + name + '</h2>'
      out.appendChild(currentGroup)
    }

    function assert(name, cond, detail) {
      const row = document.createElement('div')
      row.className = 'row'
      const ok = !!cond
      if (ok) pass++; else fail++
      row.innerHTML =
        '<div class="tag ' + (ok ? 'pass">PASS' : 'fail">FAIL') + '</div>' +
        '<div class="msg"><div class="name">' + name + '</div>' +
        (detail ? '<div class="detail">' + detail + '</div>' : '') + '</div>'
      currentGroup.appendChild(row)
    }

    function tryRun(name, fn) {
      try { fn(); return true }
      catch (e) { assert(name, false, 'threw: ' + e.message); return false }
    }

    // ───────────────────────────────────────────────────────────
    // 1. signal.js — signal / effect / batch / onCleanup / derived
    // ───────────────────────────────────────────────────────────
    group('core/signal.js')

    assert('EF.signal exists',   typeof EF.signal === 'function')
    assert('EF.effect exists',   typeof EF.effect === 'function')
    assert('EF.derived exists',  typeof EF.derived === 'function')
    assert('EF.batch exists',    typeof EF.batch === 'function')
    assert('EF.onCleanup exists',typeof EF.onCleanup === 'function')

    // signal read/write
    const s = EF.signal(10)
    assert('signal initial value', s() === 10)
    s.set(20)
    assert('signal.set updates value', s() === 20)
    assert('signal.peek returns value without tracking', s.peek() === 20)

    // effect tracks deps
    let runs = 0, lastSeen = null
    const dispose = EF.effect(() => { runs++; lastSeen = s() })
    assert('effect runs once on creation', runs === 1 && lastSeen === 20)
    s.set(30)
    assert('effect re-runs on signal change', runs === 2 && lastSeen === 30)

    // Object.is dirty check
    s.set(30)
    assert('effect skips on identical value', runs === 2)

    // dispose
    dispose()
    s.set(40)
    assert('disposed effect stops re-running', runs === 2)

    // derived
    const a = EF.signal(3)
    const b = EF.signal(4)
    const sum = EF.derived(() => a() + b())
    assert('derived computes initial value', sum() === 7)
    let sumRuns = 0
    EF.effect(() => { sumRuns++; sum() })
    a.set(10)
    assert('derived propagates to downstream effect', sum() === 14 && sumRuns === 2)

    // batch
    let batchRuns = 0
    const c = EF.signal(0)
    EF.effect(() => { batchRuns++; c() })
    batchRuns = 0
    EF.batch(() => { c.set(1); c.set(2); c.set(3) })
    assert('batch coalesces multiple writes into one run',
      batchRuns === 1 && c() === 3, 'runs=' + batchRuns + ' value=' + c())

    // onCleanup runs on re-run AND on dispose
    let cleanups = 0
    const tracker = EF.signal('x')
    const dispTracker = EF.effect(() => {
      tracker()
      EF.onCleanup(() => cleanups++)
    })
    tracker.set('y')
    assert('onCleanup fires on effect re-run', cleanups === 1)
    dispTracker()
    assert('onCleanup fires on dispose', cleanups === 2)

    // ───────────────────────────────────────────────────────────
    // 2. errors.js — EF.errors / reportError / safeCall / dismiss
    // ───────────────────────────────────────────────────────────
    group('core/errors.js')

    assert('EF.errors is a signal',
      typeof EF.errors === 'function' && Array.isArray(EF.errors()))
    assert('EF.reportError exists',  typeof EF.reportError === 'function')
    assert('EF.safeCall exists',     typeof EF.safeCall === 'function')
    assert('EF.dismissError exists', typeof EF.dismissError === 'function')
    assert('EF.clearErrors exists',  typeof EF.clearErrors === 'function')

    EF.clearErrors()
    assert('clearErrors empties list', EF.errors().length === 0)

    const e1 = EF.reportError({ scope: 'test' }, new Error('oops'))
    assert('reportError appends entry', EF.errors().length === 1)
    assert('entry has id',     typeof e1.id === 'string' && e1.id.length > 0)
    assert('entry has source', e1.source && e1.source.scope === 'test')
    assert('entry has message',e1.message === 'oops')
    assert('entry has stack',  typeof e1.stack === 'string')

    const e2 = EF.safeCall({ scope: 'test' }, () => { throw new Error('boom') })
    assert('safeCall returns null on throw', e2 === null)
    assert('safeCall pushes to errors',      EF.errors().length === 2)

    const e3 = EF.safeCall({ scope: 'test' }, () => 42)
    assert('safeCall returns fn result on success', e3 === 42)
    assert('safeCall does not push on success',     EF.errors().length === 2)

    EF.dismissError(EF.errors()[0].id)
    assert('dismissError removes by id', EF.errors().length === 1)

    // signal reactivity on errors
    let errRuns = 0
    const dispErr = EF.effect(() => { errRuns++; EF.errors() })
    EF.reportError({ scope: 'test' }, new Error('three'))
    assert('errors signal re-notifies on reportError', errRuns === 2)
    dispErr()
    EF.clearErrors()

    // ───────────────────────────────────────────────────────────
    // 3. bus.js — on / off / emit / error isolation
    // ───────────────────────────────────────────────────────────
    group('core/bus.js')

    assert('EF.bus exists', typeof EF.bus === 'object' && EF.bus !== null)
    assert('EF.bus.on exists',   typeof EF.bus.on === 'function')
    assert('EF.bus.off exists',  typeof EF.bus.off === 'function')
    assert('EF.bus.emit exists', typeof EF.bus.emit === 'function')

    let busSeen = null
    const offHi = EF.bus.on('hi', p => { busSeen = p })
    EF.bus.emit('hi', { msg: 'hello' })
    assert('subscriber receives payload',
      busSeen && busSeen.msg === 'hello', JSON.stringify(busSeen))

    busSeen = null
    offHi()
    EF.bus.emit('hi', { msg: 'world' })
    assert('unsubscribe stops delivery', busSeen === null)

    // multi-subscriber + error isolation
    EF.clearErrors()
    let okBefore = 0, okAfter = 0
    EF.bus.on('multi', () => { okBefore++ })
    EF.bus.on('multi', () => { throw new Error('subscriber error') })
    EF.bus.on('multi', () => { okAfter++ })
    EF.bus.emit('multi', null)
    assert('subscribers before throwing one still run', okBefore === 1)
    assert('subscribers after throwing one still run',  okAfter === 1)
    assert('thrown subscriber error routes to EF.errors',
      EF.errors().length === 1 &&
      EF.errors()[0].source.scope === 'bus' &&
      EF.errors()[0].source.topic === 'multi')

    // off-during-emit safety (snapshot test)
    let runsDuringRemove = 0
    const offA = EF.bus.on('rm', () => { runsDuringRemove++; offA(); offB() })
    const offB = EF.bus.on('rm', () => { runsDuringRemove++ })
    EF.bus.emit('rm', null)
    assert('handlers can unsubscribe during emit without skipping',
      runsDuringRemove === 2, 'ran ' + runsDuringRemove)

    EF.clearErrors()

    // ───────────────────────────────────────────────────────────
    // 4. widgets/registry.js — register / resolve / defaults
    // ───────────────────────────────────────────────────────────
    group('widgets/registry.js')

    assert('EF.registerWidget exists', typeof EF.registerWidget === 'function')
    assert('EF.resolveWidget exists',  typeof EF.resolveWidget === 'function')
    assert('EF.widgetDefaults exists', typeof EF.widgetDefaults === 'function')

    // valid registration
    let registered = false
    tryRun('register valid widget', () => {
      EF.registerWidget('test-widget', {
        create: () => document.createElement('div'),
        defaults: () => ({ title: 'Test', props: { x: 1 } }),
      })
      registered = true
    })
    assert('registration succeeded', registered)

    const spec = EF.resolveWidget('test-widget')
    assert('resolveWidget returns spec', spec && typeof spec.create === 'function')

    const defaults = EF.widgetDefaults('test-widget')
    assert('widgetDefaults returns object',
      defaults && defaults.title === 'Test' && defaults.props.x === 1)

    // duplicate name throws
    let dupThrew = false
    try { EF.registerWidget('test-widget', { create: () => null }) }
    catch (e) { dupThrew = true }
    assert('duplicate registration throws', dupThrew)

    // missing create throws
    let badThrew = false
    try { EF.registerWidget('bad', {}) }
    catch (e) { badThrew = true }
    assert('spec without create throws', badThrew)

    // empty name throws
    let emptyThrew = false
    try { EF.registerWidget('', { create: () => null }) }
    catch (e) { emptyThrew = true }
    assert('empty name throws', emptyThrew)

    // unknown resolve throws
    let unknownThrew = false
    try { EF.resolveWidget('nope') }
    catch (e) { unknownThrew = true }
    assert('resolveWidget on unknown throws', unknownThrew)

    // widget without defaults() returns {}
    EF.registerWidget('no-defaults', { create: () => document.createElement('div') })
    const empty = EF.widgetDefaults('no-defaults')
    assert('widgetDefaults returns {} when defaults() not provided',
      empty && typeof empty === 'object' && Object.keys(empty).length === 0)

    // ───────────────────────────────────────────────────────────
    // Summary
    // ───────────────────────────────────────────────────────────
    const summary = document.getElementById('summary')
    summary.className = 'summary ' + (fail === 0 ? 'ok' : 'bad')
    summary.textContent =
      (fail === 0 ? '✓ ALL PASS — ' : '✗ ' + fail + ' FAILED — ') +
      pass + ' passed, ' + fail + ' failed (' + (pass + fail) + ' total)'
  </script>
</body>
</html>
